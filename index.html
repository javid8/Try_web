<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      html, body {
        margin: 0;
        overflow: hidden;
        width: 100%;
        height: 100%;
      }

      #start-button {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 999;
        padding: 16px 32px;
        font-size: 20px;
        background-color: #ff6600;
        color: white;
        border: none;
        border-radius: 12px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>

    <!-- Start button to unlock camera + video on mobile -->
    <button id="start-button">Tap to Start AR</button>

    <a-scene
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: false;"
      color-space="sRGB"
      renderer="colorManagement: true, physicallyCorrectLights"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >
      <a-assets>
        <video
          id="my-video"
          src="./Video_1.mp4"
          playsinline
          webkit-playsinline
          muted
          loop="true"
          crossorigin="anonymous"
          preload="auto"
        ></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-video
          src="#my-video"
          position="0 0 0"
          width="1.5"
          height="0.843"
          rotation="0 0 0"
        ></a-video>
      </a-entity>
    </a-scene>

    <script>
      const sceneEl = document.querySelector("a-scene");
      const video = document.querySelector("#my-video");
      const startButton = document.getElementById("start-button");

      // Step 1: User taps button → unlocks video + starts AR
      startButton.addEventListener("click", () => {
        startButton.style.display = "none";

        // Pre-load and mute to unlock autoplay on mobile
        video.muted = true;
        video.play().then(() => {
          video.pause();
          video.currentTime = 0;
        }).catch(e => console.warn("Video preload failed:", e));

        // Start AR after user gesture
        const arSystem = sceneEl.systems["mindar-image-system"];
        arSystem.start();
      });

      // Step 2: Image found → play video
      sceneEl.addEventListener("targetFound", () => {
        video.muted = false; // unmute when target is found
        video.currentTime = 0;
        video.play().catch(e => console.warn("Play failed:", e));
      });

      // Step 3: Image lost → pause video
      sceneEl.addEventListener("targetLost", () => {
        video.pause();
      });
    </script>

  </body>
</html>
